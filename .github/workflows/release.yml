name: Release
permissions:
  "contents": "write"

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  build-local-artifacts:
    name: build-local-artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: 'ubuntu-24.04'
            container: 'buildpack-deps:focal'
            target: 'x86_64-unknown-linux-gnu'
          - runner: 'macos-15-intel'
            target: 'x86_64-apple-darwin'
          - runner: 'macos-14'
            target: 'aarch64-apple-darwin'
          - runner: 'windows-2022'
            target: 'x86_64-pc-windows-msvc'
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      #      - name: enable windows longpaths
      #        run: |
      #          git config --global core.longpaths true
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: astral-sh/setup-uv@v6
      - name: Install jq
        if: matrix.container == 'buildpack-deps:focal'
        run: curl -o /usr/bin/jq -L https://github.com/stedolan/jq/releases/download/jq-1.5/jq-linux64 && chmod +x /usr/bin/jq
      - uses: Swatinem/rust-cache@v2.7.3
      - name: Install dll-pack-builder
        run: uv tool install git+https://github.com/foro-fmt/dll-pack-builder@1e90b63
      - name: Build artifacts
        env:
          DLL_PACK_TARGET: ${{ matrix.target }}
          BUILD_OUT_DIR: ./target/${{ matrix.target }}/super-release
          DLL_PACK_GH_TAG: ${{ github.ref_name }}
        run: bash ./dll-pack-build-local.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-build-local-${{ matrix.target }}
          path: artifacts

  build-global-artifacts:
    needs:
      - build-local-artifacts
    runs-on: "ubuntu-latest"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dll-pack-builder
        run: python3 -m pip install git+https://github.com/foro-fmt/dll-pack-builder@1e90b63
      - name: Fetch local artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Build artifacts
        run: bash ./dll-pack-build-global.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-build-global
          path: artifacts

  host:
    needs:
      - build-local-artifacts
      - build-global-artifacts
    if: ${{ startsWith(github.ref, 'refs/tags/') && always() && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
      - name: Fetch artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-build-global
          path: artifacts
      - name: Get the tag name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
      - name: Create GitHub Release
        env:
          # todo
          PRERELEASE_FLAG: ""
          RELEASE_COMMIT: "${{ github.sha }}"
        run: |
          if [ ! -s RELEASE_NOTES.md ] || grep -qi "TODO\|placeholder" RELEASE_NOTES.md; then
            echo "Error: RELEASE_NOTES.md is missing or contains placeholder text." >&2
            echo "Write release notes in RELEASE_NOTES.md and commit before pushing the tag." >&2
            exit 1
          fi
          gh release create "${{ env.TAG_NAME }}" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "${{ env.TAG_NAME }}" --notes-file RELEASE_NOTES.md artifacts/*
